<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo-ocho.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="%VITE_META_DESCRIPTION%" />
    <meta name="keywords" content="%VITE_META_KEYWORDS%" />
    <meta name="author" content="%VITE_SHOP_NAME%" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="%VITE_OG_TITLE%" />
    <meta property="og:description" content="%VITE_OG_DESCRIPTION%" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="id_ID" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_OG_TITLE%" />
    <meta name="twitter:description" content="%VITE_OG_DESCRIPTION%" />
    <link rel="canonical" href="%VITE_SITE_URL%" />
    <title>%VITE_OG_TITLE%</title>
    <!-- LocalBusiness Schema Markup -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "%VITE_SHOP_NAME%",
        "image": "%VITE_SITE_URL%/logo-ocho.jpeg",
        "url": "%VITE_SITE_URL%",
        "telephone": "%VITE_PHONE%",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "%VITE_ADDRESS%",
          "addressLocality": "Bogor",
          "addressRegion": "Jawa Barat",
          "postalCode": "16820",
          "addressCountry": "ID"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": "-6.3689736",
          "longitude": "106.9845748"
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": [
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday",
            "Sunday"
          ],
          "opens": "08:00",
          "closes": "17:00"
        },
        "priceRange": "$$"
      }
    </script>
  </head>
  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
